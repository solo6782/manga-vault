<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — MangaVault</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="ambient-bg"></div>

  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">
        <a href="index.html"><h1>Manga<span>Vault</span></h1></a>
        <p>Connecte-toi pour accéder à ta collection</p>
      </div>

      <!-- Google -->
      <button id="btn-google" class="btn-google" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        Continuer avec Google
      </button>

      <div class="login-divider">
        <div></div><span>ou</span><div></div>
      </div>

      <!-- Email -->
      <form id="email-form" onsubmit="loginEmail(event)">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" placeholder="ton@email.com" required>
        <button class="btn-submit" type="submit" id="btn-email">
          Recevoir un lien magique ✨
        </button>
      </form>

      <div id="message" style="display:none"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    // Si déjà connecté, rediriger
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = "dashboard.html";
    })();

    // Écouter les changements d'auth
    sb.auth.onAuthStateChange((event, session) => {
      if (event === "SIGNED_IN" && session) {
        window.location.href = "dashboard.html";
      }
    });

    function showMessage(text, type) {
      const el = document.getElementById("message");
      el.textContent = text;
      el.className = "message " + type;
      el.style.display = "block";
    }

    async function loginGoogle() {
      const { error } = await sb.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: SITE_URL + "/dashboard.html" }
      });
      if (error) showMessage(error.message, "error");
    }

    async function loginEmail(e) {
      e.preventDefault();
      const btn = document.getElementById("btn-email");
      const email = document.getElementById("email").value;
      btn.disabled = true;
      btn.textContent = "Envoi en cours...";

      const { error } = await sb.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: SITE_URL + "/dashboard.html" }
      });

      if (error) {
        showMessage(error.message, "error");
      } else {
        showMessage("Vérifie ta boîte mail ! Un lien de connexion t'a été envoyé.", "success");
      }
      btn.disabled = false;
      btn.textContent = "Recevoir un lien magique ✨";
    }
  </script>
</body>
</html>
